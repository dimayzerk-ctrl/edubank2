{% extends 'base.html' %}

{% block content %}
<div class="form-card">
    <h2>Вход</h2>
    <form method="POST">
        {{ form.hidden_tag() }}

        <label>{{ form.email.label }}</label>
        {{ form.email(class="input-field") }}

        <label>{{ form.password.label }}</label>
        {{ form.password(class="input-field") }}

        {{ form.submit(class="btn primary full") }}
    </form>
</div>
{% endblock %}
